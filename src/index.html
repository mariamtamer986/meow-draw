<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Drawing App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic&display=swap" rel="stylesheet">
</head>
<body>

    <div class="canvas-layer">
        <canvas id="canvasBG"></canvas>
        <canvas id="canvas1"></canvas>
    </div>

    <div class="frame">
        <img src="../assets/frame/frame-t.svg" id="top-frame" />
        <img src="../assets/frame/frame-r.svg" id="right-frame" />
        <img src="../assets/frame/frame-l.svg" id="left-frame" />
        <img src="../assets/frame/frame-b.svg" id="bottom-frame" />
    </div>

    <div class="color-cat" id="colorHandle">

        <button class="color-btn"></button>

        <div class="hide" id="color-picker">
            <div>
                <input type="color" id="brushC" name="brushC" value="#000000" />
                <label for="brushC">Brush color</label>
            </div>

            <div>
                <input
                    type="color"
                    id="background"
                    name="background"
                    value="#FFFFFF"
                    colorspace="display-p3"
                    alpha />
                <label for="background">Background color</label>
            </div>
        </div>
    </div>

    <div class="save-cat">
        <button class="save-btn"></button>
    </div>

    <div class="sticker-cat">
        <button class="sticker-btn"></button>
    </div>

    <div class="hide" id="stickers-container">
        <button class="sticker" style="background-image: url('../assets/stickers/s1.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s2.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s3.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s4.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s5.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s6.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s7.svg');"></button>
        <button class="sticker" style="background-image: url('../assets/stickers/s8.svg');"></button>
    </div>

    <script src="index.js"></script>
</body>
</html>
